name: Build Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW="${GITHUB_REF#refs/tags/v}"
            # Ensure semver (x.y.z) — pad missing parts with .0
            IFS='.' read -ra PARTS <<< "$RAW"
            MAJOR="${PARTS[0]:-0}"
            MINOR="${PARTS[1]:-0}"
            PATCH="${PARTS[2]:-0}"
            VERSION="$MAJOR.$MINOR.$PATCH"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          cd ed-companion/src-tauri
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.version }}\"/" tauri.conf.json
          cat tauri.conf.json | head -5

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          cd ed-companion/src-tauri
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ed-companion/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ed-companion
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ed-companion
          tauriScript: pnpm tauri

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-msi
          path: ed-companion/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-nsis
          path: ed-companion/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-exe
          path: ed-companion/src-tauri/target/release/ed-companion.exe
          if-no-files-found: warn

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ED Farpoint ${{ github.ref_name }}
          files: |
            ed-companion/src-tauri/target/release/bundle/msi/*.msi
            ed-companion/src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          generate_release_notes: true
