name: Build Windows

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ed-companion/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ed-companion
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ed-companion
          tauriScript: pnpm tauri

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-msi
          path: ed-companion/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-nsis
          path: ed-companion/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-windows-exe
          path: ed-companion/src-tauri/target/release/ed-companion.exe
          if-no-files-found: warn

      # Create GitHub release on tag push
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ed-companion/src-tauri/target/release/bundle/msi/*.msi
            ed-companion/src-tauri/target/release/bundle/nsis/*.exe
          draft: true
          generate_release_notes: true
