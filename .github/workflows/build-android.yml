name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ed-companion/src-tauri -> target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ed-companion
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Initialize Tauri Android
        working-directory: ed-companion
        run: pnpm tauri android init

      - name: Build Android APK (debug)
        working-directory: ed-companion
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: pnpm tauri android build --apk

      - name: Find APK files
        id: find-apk
        run: |
          APK_PATH=$(find ed-companion/src-tauri/gen/android -name "*.apk" -path "*/release/*" -o -name "*.apk" -path "*/debug/*" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          find ed-companion/src-tauri/gen/android -name "*.apk" -ls

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ed-farpoint-android-apk
          path: ed-companion/src-tauri/gen/android/**/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      # Create GitHub release on tag push
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ed-companion/src-tauri/gen/android/**/build/outputs/apk/**/*.apk
          draft: true
          generate_release_notes: true
